# MarqueeFlow POS — production (isolated from MarqueeFlow booking + AluRate)
# certbot --nginx -d pos.marqueeflow.com adds SSL automatically

server {
    listen 80;
    listen [::]:80;
    server_name pos.marqueeflow.com;

    root /var/www/marqueeflow-pos/dist;
    index index.html;

    access_log /var/log/marqueeflow-pos/nginx-access.log;
    error_log  /var/log/marqueeflow-pos/nginx-error.log;

    location /api/ {
        proxy_pass http://127.0.0.1:8085/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /product-images/ {
        proxy_pass http://127.0.0.1:8085;
        proxy_set_header Host $host;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
