# MarqueeFlow POS — staging (isolated from MarqueeFlow booking + AluRate)

server {
    listen 80;
    server_name staging.pos.marqueeflow.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name staging.pos.marqueeflow.com;

    ssl_certificate     /etc/letsencrypt/live/staging.pos.marqueeflow.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/staging.pos.marqueeflow.com/privkey.pem;

    root /var/www/marqueeflow-pos-staging/dist;
    index index.html;

    access_log /var/log/marqueeflow-pos/nginx-staging-access.log;
    error_log  /var/log/marqueeflow-pos/nginx-staging-error.log;

    location /api/ {
        proxy_pass http://127.0.0.1:8088;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /product-images/ {
        proxy_pass http://127.0.0.1:8088;
        proxy_set_header Host $host;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
