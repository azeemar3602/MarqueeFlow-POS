name: Deploy POS to Production

on:
  push:
    branches: [main]

concurrency:
  group: marqueeflow-pos-deploy-production
  cancel-in-progress: false

jobs:
  test:
    name: Full test suite (required)
    uses: ./.github/workflows/test.yml

  deploy:
    name: Deploy MarqueeFlow POS Production
    needs: test
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Deploy POS production via SSH (isolated paths only)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_SSH_HOST }}
          username: ${{ secrets.VPS_SSH_USER }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          port: ${{ secrets.VPS_SSH_PORT || 22 }}
          timeout: 60s
          command_timeout: 20m
          script: |
            set -e
            echo "=== MarqueeFlow POS production deploy (does not touch MarqueeFlow/AluRate) ==="

            cd /var/www/marqueeflow-pos-repo
            git fetch origin
            git reset --hard origin/main

            echo "--- Building backend ---"
            cd /var/www/marqueeflow-pos-repo/backend
            npm ci
            npm run build
            rsync -a --delete /var/www/marqueeflow-pos-repo/backend/dist/ /var/www/marqueeflow-pos-backend/dist/
            cp /var/www/marqueeflow-pos-repo/backend/package.json /var/www/marqueeflow-pos-backend/package.json
            cp /var/www/marqueeflow-pos-repo/backend/package-lock.json /var/www/marqueeflow-pos-backend/package-lock.json
            cd /var/www/marqueeflow-pos-backend
            npm ci --omit=dev
            pm2 reload marqueeflow-pos-backend

            echo "--- Building frontend ---"
            cd /var/www/marqueeflow-pos-repo/frontend
            npm ci
            npm run build
            rsync -a --delete /var/www/marqueeflow-pos-repo/frontend/dist/ /var/www/marqueeflow-pos/dist/

            echo "=== POS production deploy complete ==="

      - name: Notify on success
        if: success()
        run: echo "MarqueeFlow POS production deploy succeeded for commit ${{ github.sha }}"

      - name: Notify on failure
        if: failure()
        run: echo "MARQUEEFLOW POS PRODUCTION DEPLOY FAILED"
