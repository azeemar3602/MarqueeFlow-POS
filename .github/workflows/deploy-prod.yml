name: Deploy to Production

on:
  push:
    branches: [main]

# Block concurrent prod deploys
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  # ── Gate 1: All tests must pass ─────────────────────────────────────────────
  test:
    name: Full test suite (required)
    uses: ./.github/workflows/test.yml

  # ── Gate 2: Require manual approval ─────────────────────────────────────────
  deploy:
    name: Deploy Production
    needs: test
    runs-on: ubuntu-latest
    environment: production    # <-- requires a reviewer approval in GitHub Environments

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to production server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          timeout: 60s
          command_timeout: 20m
          script: |
            set -e
            echo "=== Production deploy started ==="

            # Pull latest monorepo code (single source of truth)
            cd /root/retailpos-repo
            git fetch origin
            git reset --hard origin/main

            # --- Backend: build in monorepo, sync dist into the serving dir ---
            echo "--- Building backend ---"
            cd /root/retailpos-repo/backend
            npm ci
            npm run build
            rsync -a --delete /root/retailpos-repo/backend/dist/ /root/retailpos-backend/dist/
            cp /root/retailpos-repo/backend/package.json /root/retailpos-backend/package.json
            cp /root/retailpos-repo/backend/package-lock.json /root/retailpos-backend/package-lock.json
            cd /root/retailpos-backend
            npm ci --omit=dev
            pm2 reload /root/retailpos-backend/ecosystem.config.js --update-env

            # --- Frontend: build in monorepo, sync dist into nginx docroot ---
            echo "--- Building frontend ---"
            cd /root/retailpos-repo/frontend
            npm ci
            npm run build
            rsync -a --delete /root/retailpos-repo/frontend/dist/ /root/retailpos/dist/

            echo "=== Production deploy complete ==="

      - name: Notify on success
        if: success()
        run: echo "Production deploy succeeded for commit ${{ github.sha }}"

      - name: Notify on failure
        if: failure()
        run: echo "PRODUCTION DEPLOY FAILED — rollback manually if needed"
