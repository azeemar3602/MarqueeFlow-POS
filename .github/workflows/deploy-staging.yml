name: Deploy POS to Staging

on:
  push:
    branches: [staging]

concurrency:
  group: marqueeflow-pos-deploy-staging
  cancel-in-progress: true

jobs:
  test:
    name: Tests must pass before deploy
    uses: ./.github/workflows/test.yml

  deploy:
    name: Deploy MarqueeFlow POS Staging
    needs: test
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - name: Deploy POS staging via SSH (isolated paths only)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_SSH_HOST }}
          username: ${{ secrets.VPS_SSH_USER }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          port: ${{ secrets.VPS_SSH_PORT || 22 }}
          timeout: 60s
          command_timeout: 20m
          script: |
            set -e
            echo "=== MarqueeFlow POS staging deploy (does not touch MarqueeFlow/AluRate) ==="

            cd /var/www/marqueeflow-pos-repo
            git fetch origin
            git reset --hard origin/staging

            echo "--- Building backend ---"
            cd /var/www/marqueeflow-pos-repo/backend
            rm -rf node_modules
            npm ci
            npm run build
            rsync -a --delete /var/www/marqueeflow-pos-repo/backend/dist/ /var/www/marqueeflow-pos-backend-staging/dist/
            cp /var/www/marqueeflow-pos-repo/backend/package.json /var/www/marqueeflow-pos-backend-staging/package.json
            cp /var/www/marqueeflow-pos-repo/backend/package-lock.json /var/www/marqueeflow-pos-backend-staging/package-lock.json
            cd /var/www/marqueeflow-pos-backend-staging
            rm -rf node_modules
            npm ci --omit=dev
            pm2 reload marqueeflow-pos-backend-staging

            echo "--- DB migrations (staging) ---"
            MYSQL="$(command -v mysql)"
            source /root/.marqueeflow-pos-secrets 2>/dev/null || true
            for f in $(ls /var/www/marqueeflow-pos-repo/backend/migrations/*.sql 2>/dev/null | sort); do
              echo "Applying $f to marqueeflow_pos_db_staging"
              "$MYSQL" -u mf_pos_user ${MF_POS_DB_PASS:+-p"$MF_POS_DB_PASS"} marqueeflow_pos_db_staging < "$f" || true
            done

            echo "--- Building frontend ---"
            cd /var/www/marqueeflow-pos-repo/frontend
            rm -rf node_modules
            npm ci
            npm run build
            rsync -a --delete /var/www/marqueeflow-pos-repo/frontend/dist/ /var/www/marqueeflow-pos-staging/dist/

            echo "=== POS staging deploy complete ==="
