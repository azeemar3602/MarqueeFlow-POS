name: Deploy to Staging

on:
  push:
    branches: [staging]

# Block concurrent deploys to staging
concurrency:
  group: deploy-staging
  cancel-in-progress: true

jobs:
  test:
    name: Tests must pass before deploy
    uses: ./.github/workflows/test.yml

  deploy:
    name: Deploy Staging
    needs: test
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to staging server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            set -e
            echo "=== Deploying to staging ==="

            # Pull latest monorepo code (single source of truth)
            cd /root/retailpos-repo
            git fetch origin
            git reset --hard origin/staging

            # --- Backend: build in monorepo, sync dist into the serving dir ---
            echo "--- Building backend ---"
            cd /root/retailpos-repo/backend
            npm ci
            npm run build
            rsync -a --delete /root/retailpos-repo/backend/dist/ /root/retailpos-backend-staging/dist/
            cp /root/retailpos-repo/backend/package.json /root/retailpos-backend-staging/package.json
            cp /root/retailpos-repo/backend/package-lock.json /root/retailpos-backend-staging/package-lock.json
            cd /root/retailpos-backend-staging
            npm ci --omit=dev
            pm2 reload retailpos-backend-staging --update-env

            # --- Frontend: build in monorepo, sync dist into nginx root ---
            echo "--- Building frontend ---"
            cd /root/retailpos-repo/frontend
            npm ci
            npm run build
            rsync -a --delete /root/retailpos-repo/frontend/dist/ /root/retailpos-staging/dist/

            echo "=== Staging deploy complete ==="
