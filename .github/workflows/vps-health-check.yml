name: VPS Health Check

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: VPS health diagnostics
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_SSH_HOST }}
          username: ${{ secrets.VPS_SSH_USER }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          port: ${{ secrets.VPS_SSH_PORT || 22 }}
          timeout: 60s
          command_timeout: 5m
          script: |
            set +e
            echo "=== VPS health ==="
            uptime
            echo "--- ports 80/443/8085/8088 ---"
            ss -tlnp | grep -E ':80|:443|:8085|:8088' || echo "no listeners"
            echo "--- nginx ---"
            systemctl is-active nginx
            nginx -t 2>&1
            echo "--- pm2 pos ---"
            pm2 list | grep -E 'marqueeflow-pos|online|errored' || pm2 list
            echo "--- curl localhost ---"
            curl -sI --connect-timeout 5 http://127.0.0.1:8085/health | head -5
            curl -sI --connect-timeout 5 -H 'Host: pos.marqueeflow.com' http://127.0.0.1/ | head -5
            echo "--- ufw/iptables ---"
            ufw status 2>/dev/null || echo "ufw n/a"
            iptables -L INPUT -n 2>/dev/null | head -15
            echo "--- disk/mem ---"
            df -h / | tail -1
            free -h | head -2
