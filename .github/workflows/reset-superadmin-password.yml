name: Reset Super Admin Password

on:
  workflow_dispatch:

jobs:
  reset:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Update super admin password on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_SSH_HOST }}
          username: ${{ secrets.VPS_SSH_USER }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          port: ${{ secrets.VPS_SSH_PORT || 22 }}
          timeout: 60s
          command_timeout: 2m
          script: |
            set -e
            BCRYPT_HASH='$2a$10$IcRoIvRJxSGoxKmhNnzSk.5jvr/rN2zeQv1idDkl0VRvmi1a8PINq'
            mysql marqueeflow_pos_db -e \
              "INSERT INTO super_admins (name,email,password) VALUES ('Super Admin','support@marqueeflow.com','${BCRYPT_HASH}')
               ON DUPLICATE KEY UPDATE password=VALUES(password), name=VALUES(name);"
            echo "Super admin password synced for support@marqueeflow.com"
