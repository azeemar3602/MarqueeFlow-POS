name: Reset Super Admin Password

on:
  workflow_dispatch:

jobs:
  reset:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Update super admin password on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_SSH_HOST }}
          username: ${{ secrets.VPS_SSH_USER }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          port: ${{ secrets.VPS_SSH_PORT || 22 }}
          timeout: 60s
          command_timeout: 2m
          script: |
            set -e
            BCRYPT_HASH='$2a$10$IcRoIvRJxSGoxKmhNnzSk.5jvr/rN2zeQv1idDkl0VRvmi1a8PINq'
            MYSQL=(mysql -N)
            if [ -f /root/.marqueeflow-pos-secrets ]; then
              source /root/.marqueeflow-pos-secrets
              MYSQL=(mysql -u"$MYSQL_USER" -p"$MYSQL_PASS" -N)
            fi
            COUNT=$("${MYSQL[@]}" -e "SELECT COUNT(*) FROM marqueeflow_pos_db.super_admins WHERE email='support@marqueeflow.com'" 2>/dev/null || echo 0)
            if [ "${COUNT:-0}" = "0" ]; then
              mysql marqueeflow_pos_db -e "INSERT INTO super_admins (name,email,password) VALUES ('Super Admin','support@marqueeflow.com','${BCRYPT_HASH}');"
              echo "Created super admin"
            else
              mysql marqueeflow_pos_db -e "UPDATE super_admins SET password='${BCRYPT_HASH}' WHERE email='support@marqueeflow.com';"
              echo "Password updated for support@marqueeflow.com"
            fi
            echo "Password is: MarqueeFlowPOS2026!"
