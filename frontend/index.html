<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="theme-color" content="#4f46e5" />
    <meta name="description" content="MarqueeFlow POS — Point of Sale for Pakistani Retail Shops" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="MarqueeFlow POS" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MarqueeFlow POS — Point of Sale</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Capture the install prompt before React mounts so it is never missed.
      window.addEventListener('beforeinstallprompt', function (e) {
        e.preventDefault();
        window.__pwaPrompt = e;
        window.dispatchEvent(new Event('pwa-can-install'));
      });
      window.addEventListener('appinstalled', function () {
        window.__pwaPrompt = null;
        window.dispatchEvent(new Event('pwa-installed'));
      });
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
